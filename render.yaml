# Render.com Deployment Configuration
# https://render.com/docs/render-yaml-spec
#
# Deploy steps (first time):
# 1. Push this file to GitHub
# 2. On Render dashboard: New > Blueprint > connect this repo
# 3. Set the secret env vars marked with `sync: false` in the dashboard
#
# NOTE: Free tier has no persistent disk — the auto-seed in src/utils/seedIfEmpty.ts
# re-populates the 20 articles and 2 users automatically on every restart.

services:
  - type: web
    name: tenerife-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      # SQLite path inside the container (ephemeral on free tier — auto-seed handles it)
      - key: SQLALCHEMY_DATABASE_URI
        value: sqlite:///./data/sql_app.db
      # Set these manually in the Render dashboard:
      - key: SECRET_KEY
        sync: false # REQUIRED — set in dashboard
      - key: OPENAI_API_KEY
        sync: false # optional — enables AI search
      - key: TAVILY_API_KEY
        sync: false # optional — enables web search
      - key: CORS_ORIGINS
        sync: false # e.g. https://your-frontend.onrender.com

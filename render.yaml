# Render.com Deployment Configuration
# https://render.com/docs/render-yaml-spec
#
# Deploy steps (first time):
# 1. Push this file to GitHub
# 2. On Render dashboard: New > Blueprint > connect this repo
# 3. Set the secret env vars marked with `sync: false` in the dashboard
#
# NOTE: Free tier has no persistent disk — the auto-seed in src/utils/seedIfEmpty.ts
# re-populates the 20 articles and 2 users automatically on every restart.

services:
  # ---------- Backend ----------
  - type: web
    name: tenerife-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: SQLALCHEMY_DATABASE_URI
        value: sqlite:///./data/sql_app.db
      - key: SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://master-start2impact.onrender.com

  # ---------- Frontend ----------
  - type: static
    name: tenerife-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist

    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://tenerife-backend.onrender.com/api/v1
